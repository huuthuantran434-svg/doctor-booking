<!DOCTYPE html>
<html>
<head>
<title>Doctor Booking</title>
</head>

<body>

<h2>Đặt lịch khám</h2>

<input id="name" placeholder="Tên bệnh nhân"><br><br>
<input id="doctor" placeholder="Bác sĩ"><br><br>
<input id="date" type="date"><br><br>
<input id="time" type="time"><br><br>

<button onclick="datLich()">Đặt lịch</button>
<h2>Danh sách lịch</h2>

<div id="list"></div>

<script>
async function datLich(){

const name = document.getElementById("name").value
const doctor = document.getElementById("doctor").value
const date = document.getElementById("date").value
const time = document.getElementById("time").value

await fetch("https://doctor-booking-bx0n.onrender.com/booking",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
doctor,
date,
time
})
})

alert("Đặt lịch thành công")

}
</script>


</body>
<script>

async function loadLich(){

const res = await fetch("https://doctor-booking-bx0n.onrender.com/booking")
const data = await res.json()

const list = document.getElementById("list")

list.innerHTML=""

data.forEach(item=>{
list.innerHTML += `
<p>
${item.name} - ${item.doctor} - ${item.date} - ${item.time}
</p>
`
})

}

// load dữ liệu khi mở trang
loadLich()

</script>
</html>
